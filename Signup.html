<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltGuard AI — Sign Up</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="bg"></div>
    <img class="car-bg" src="car-bg.png" alt="" />

    <div class="auth-container">
        <div class="auth-card glass">
            <div class="brand">
                <span class="logo">⚡</span> VoltGuard AI
            </div>
            <h2>Create Account</h2>
            <p class="subtitle">Monitor your EV battery in real-time</p>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="John Doe" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="you@example.com" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Min. 6 characters" />
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="signup-confirm" placeholder="Repeat password" />
            </div>

            <div id="signup-error" class="error-msg"></div>

            <button class="btn-primary" onclick="handleSignup()">Create Account</button>

            <p class="switch-link">Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <script>
        function handleSignup() {
            const name     = document.getElementById('signup-name').value.trim();
            const email    = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirm  = document.getElementById('signup-confirm').value;
            const errEl    = document.getElementById('signup-error');

            errEl.innerText = '';

            if (!name || !email || !password || !confirm) {
                errEl.innerText = 'Please fill in all fields.'; return;
            }
            if (password.length < 6) {
                errEl.innerText = 'Password must be at least 6 characters.'; return;
            }
            if (password !== confirm) {
                errEl.innerText = 'Passwords do not match.'; return;
            }

            // Check if email already registered
            const users = JSON.parse(localStorage.getItem('voltguard_users') || '[]');
            if (users.find(u => u.email === email)) {
                errEl.innerText = 'An account with this email already exists.'; return;
            }

            // Save user
            users.push({ name, email, password });
            localStorage.setItem('voltguard_users', JSON.stringify(users));

            // Auto login
            localStorage.setItem('voltguard_session', JSON.stringify({ name, email }));

            window.location.href = 'index.html';
        }

        // If already logged in, skip to dashboard
        if (localStorage.getItem('voltguard_session')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
